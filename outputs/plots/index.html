<!DOCTYPE html>
<html>
<head>
    <title>Mona Lisa Lottery Interactive Viewer</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; text-align: center; margin: 0; padding: 2rem; }
        h1 { background: linear-gradient(90deg, #00ffcc, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grid { display: flex; justify-content: center; gap: 2rem; margin-top: 2rem; }
        .card { background: #1e293b; padding: 1rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        img { border-radius: 8px; max-width: 100%; border: 2px solid #334155; transition: transform 0.2s; }
        img:hover { transform: scale(1.02); }
        input[type=range] { width: 60%; margin: 2rem 0; accent-color: #00ffcc; }
        h3 { margin-top: 0; }
        .iteration-label { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; color: #ffcc00; }
    </style>
</head>
<body>
    <h1>The Mona Lisa Lottery Visualization</h1>
    <p>Slide to prune the Implicit Neural Representation!</p>
    <div class="iteration-label" id="stepLabel">Iteration: 1</div>
    <input type="range" id="slider" min="0" max="20" value="0" oninput="updateImages()">

    <div class="grid">
        <div class="card">
            <h3>Winning Ticket</h3>
            <img id="winner" src="../winner/iter_01_remaining_100.0pct.png" alt="Winner">
        </div>
        <div class="card">
            <h3>Random Ticket</h3>
            <img id="random" src="../random/iter_01_remaining_100.0pct.png" alt="Random">
        </div>
        <div class="card">
            <h3>Losing Ticket</h3>
            <img id="loser" src="../loser/iter_01_remaining_100.0pct.png" alt="Loser">
        </div>
    </div>
    <script>
        const data = {"winner": ["../winner/iter_01_remaining_100.0pct.png", "../winner/iter_02_remaining_80.0pct.png", "../winner/iter_03_remaining_64.0pct.png", "../winner/iter_04_remaining_51.2pct.png", "../winner/iter_05_remaining_41.0pct.png", "../winner/iter_06_remaining_32.8pct.png", "../winner/iter_07_remaining_26.2pct.png", "../winner/iter_08_remaining_21.0pct.png", "../winner/iter_09_remaining_16.8pct.png", "../winner/iter_10_remaining_13.4pct.png", "../winner/iter_11_remaining_10.7pct.png", "../winner/iter_12_remaining_8.6pct.png", "../winner/iter_13_remaining_6.9pct.png", "../winner/iter_14_remaining_5.5pct.png", "../winner/iter_15_remaining_4.4pct.png", "../winner/iter_16_remaining_3.5pct.png", "../winner/iter_17_remaining_2.8pct.png", "../winner/iter_18_remaining_2.3pct.png", "../winner/iter_19_remaining_1.8pct.png", "../winner/iter_20_remaining_1.4pct.png", "../winner/iter_21_remaining_1.2pct.png"], "random": ["../random/iter_01_remaining_100.0pct.png", "../random/iter_02_remaining_80.0pct.png", "../random/iter_03_remaining_64.0pct.png", "../random/iter_04_remaining_51.2pct.png", "../random/iter_05_remaining_41.0pct.png", "../random/iter_06_remaining_32.8pct.png", "../random/iter_07_remaining_26.2pct.png", "../random/iter_08_remaining_21.0pct.png", "../random/iter_09_remaining_16.8pct.png", "../random/iter_10_remaining_13.4pct.png", "../random/iter_11_remaining_10.7pct.png", "../random/iter_12_remaining_8.6pct.png", "../random/iter_13_remaining_6.9pct.png", "../random/iter_14_remaining_5.5pct.png", "../random/iter_15_remaining_4.4pct.png", "../random/iter_16_remaining_3.5pct.png", "../random/iter_17_remaining_2.8pct.png", "../random/iter_18_remaining_2.3pct.png", "../random/iter_19_remaining_1.8pct.png", "../random/iter_20_remaining_1.4pct.png", "../random/iter_21_remaining_1.2pct.png"], "loser": ["../loser/iter_01_remaining_100.0pct.png", "../loser/iter_02_remaining_80.0pct.png", "../loser/iter_03_remaining_64.0pct.png", "../loser/iter_04_remaining_51.2pct.png", "../loser/iter_05_remaining_41.0pct.png", "../loser/iter_06_remaining_32.8pct.png", "../loser/iter_07_remaining_26.2pct.png", "../loser/iter_08_remaining_21.0pct.png", "../loser/iter_09_remaining_16.8pct.png", "../loser/iter_10_remaining_13.4pct.png", "../loser/iter_11_remaining_10.7pct.png", "../loser/iter_12_remaining_8.6pct.png", "../loser/iter_13_remaining_6.9pct.png", "../loser/iter_14_remaining_5.5pct.png", "../loser/iter_15_remaining_4.4pct.png", "../loser/iter_16_remaining_3.5pct.png", "../loser/iter_17_remaining_2.8pct.png", "../loser/iter_18_remaining_2.3pct.png", "../loser/iter_19_remaining_1.8pct.png", "../loser/iter_20_remaining_1.4pct.png", "../loser/iter_21_remaining_1.2pct.png"]};
        function updateImages() {
            const val = document.getElementById('slider').value;
            document.getElementById('stepLabel').innerText = "Algorithm Iteration: " + (parseInt(val) + 1);
            if(data['winner'] && data['winner'][val]) document.getElementById('winner').src = data['winner'][val];
            if(data['random'] && data['random'][val]) document.getElementById('random').src = data['random'][val];
            if(data['loser'] && data['loser'][val]) document.getElementById('loser').src = data['loser'][val];
        }
        // Init
        updateImages();
    </script>
</body>
</html>
